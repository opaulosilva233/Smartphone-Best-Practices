version: '3.8'

services:
  smartphone-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: smartphone-best-practices-dev
    ports:
      - "5173:5173"
    volumes:
      # Montar o código-fonte para hot-reload
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_HOST=0.0.0.0
    networks:
      - smartphone-network
    stdin_open: true
    tty: true

networks:
  smartphone-network:
    driver: bridge
