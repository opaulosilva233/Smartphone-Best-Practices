name: Deploy via Coolify Webhook

on:
  push:
    branches:
      - main

jobs:
  trigger-coolify-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deploy webhook
        # Configure o segredo COOLIFY_WEBHOOK em:
        # GitHub -> Repository -> Settings -> Secrets and variables -> Actions
        # Esse segredo deve conter o URL completo do webhook gerado no Coolify.
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK }}"
